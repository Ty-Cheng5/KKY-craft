<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ Infinite Craft</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121c;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7a56a;
    --text: #e8e4ff;
    --text-muted: #7a7898;
    --fire: #ff6b35;
    --water: #4fc3f7;
    --wind: #b2f7b2;
    --earth: #d4a055;
    --new: #f7e96a;
    --glow: rgba(124, 106, 247, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }

  .stats {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .stats span {
    color: var(--accent);
    font-style: normal;
    font-weight: 400;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: rgba(18,18,28,0.95);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .elements-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .elements-list::-webkit-scrollbar { width: 4px; }
  .elements-list::-webkit-scrollbar-track { background: transparent; }
  .elements-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: grab;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1.2;
  }

  .sidebar-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  .sidebar-item:active { cursor: grabbing; }

  .sidebar-item .icon { font-size: 16px; flex-shrink: 0; }

  .sidebar-item.is-new .name {
    color: var(--new);
  }

  /* CANVAS */
  .canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .canvas-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-muted);
    pointer-events: none;
    font-style: italic;
    font-size: 16px;
    line-height: 1.8;
  }

  .canvas-hint .big {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  /* ELEMENT TILES on canvas */
  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: grab;
    font-size: 14px;
    white-space: nowrap;
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
    z-index: 2;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .tile:hover {
    border-color: var(--accent);
    box-shadow: 0 0 18px var(--glow), 0 2px 12px rgba(0,0,0,0.4);
  }

  .tile.dragging {
    cursor: grabbing;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 24px var(--glow);
    transform: scale(1.05);
  }

  .tile.merging {
    animation: mergeFlash 0.4s ease forwards;
  }

  @keyframes mergeFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); box-shadow: 0 0 40px var(--accent), 0 0 80px rgba(124,106,247,0.5); }
    100% { transform: scale(0); opacity: 0; }
  }

  .tile .icon { font-size: 16px; }

  .tile .label { color: var(--text); }

  .tile.new-tile {
    border-color: var(--new);
    box-shadow: 0 0 18px rgba(247,233,106,0.3);
    animation: newPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes newPop {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* COMBINING INDICATOR */
  .combining-line {
    position: absolute;
    pointer-events: none;
    z-index: 50;
  }

  /* LOADING INDICATOR */
  .loading-tile {
    border-style: dashed;
    border-color: var(--accent);
    opacity: 0.7;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.first-discovery {
    border-color: var(--new);
    color: var(--new);
    box-shadow: 0 0 24px rgba(247,233,106,0.3);
  }

  /* Context menu */
  .context-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    z-index: 500;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .context-menu.show { display: block; }

  .context-menu button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    padding: 7px 14px;
    text-align: left;
    cursor: pointer;
    border-radius: 6px;
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    transition: background 0.1s;
  }

  .context-menu button:hover { background: var(--surface2); }
  .context-menu button.danger { color: #ff6b6b; }
</style>
</head>
<body>

<header>
  <div class="logo">∞ Infinite Craft</div>
  <div class="stats">
    <span id="discoveredCount">4</span> elements discovered · <span id="canvasCount">0</span> on canvas
  </div>
  <button class="clear-btn" onclick="clearCanvas()">Clear Canvas</button>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Elements</div>
    <div class="elements-list" id="elementsList"></div>
  </div>
  <div class="canvas" id="canvas">
    <div class="canvas-hint" id="canvasHint">
      <span class="big">✦</span>
      Drag elements onto the canvas<br>
      <small>Drop one onto another to combine</small>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="context-menu" id="contextMenu">
  <button onclick="duplicateTile()">Duplicate</button>
  <button onclick="deleteTile()" class="danger">Delete</button>
</div>

<script>
// ============================================================
// ID ALGORITHM
// New element IDs use a deterministic string hash of the
// sorted combination pair, so "Fire+Water" always → same hash.
// This hash is used as the cache key. Display IDs are
// sequential integers starting at 5 (base elements = 1–4).
// ============================================================

function pairHash(a, b) {
  // Sort alphabetically so order doesn't matter
  const key = [a, b].sort().join('|||');
  // djb2 hash → hex string
  let h = 5381;
  for (let i = 0; i < key.length; i++) {
    h = ((h << 5) + h) ^ key.charCodeAt(i);
    h = h >>> 0; // keep unsigned 32-bit
  }
  return h.toString(16);
}

// ============================================================
// STATE
// ============================================================

const BASE_ELEMENTS = [
  { id: 1, name: 'Fire',  emoji: '🔥', isNew: false },
  { id: 2, name: 'Water', emoji: '💧', isNew: false },
  { id: 3, name: 'Wind',  emoji: '🌬️', isNew: false },
  { id: 4, name: 'Earth', emoji: '🌍', isNew: false },
];

let nextId = 5;
let discovered = new Map(); // name → element object
let combinationCache = new Map(); // pairHash → element
let canvasTiles = []; // { id, element, x, y, domEl }
let nextTileId = 1;

// Initialize discovered
BASE_ELEMENTS.forEach(e => discovered.set(e.name, e));

// ============================================================
// DRAG STATE
// ============================================================

let dragging = null; // { tile, offsetX, offsetY }
let contextTarget = null;

// ============================================================
// RENDER SIDEBAR
// ============================================================

function renderSidebar() {
  const list = document.getElementById('elementsList');
  list.innerHTML = '';
  const sorted = [...discovered.values()].sort((a, b) => a.id - b.id);
  sorted.forEach(el => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (el.isNew ? ' is-new' : '');
    div.draggable = true;
    div.innerHTML = `<span class="icon">${el.emoji}</span><span class="name">${el.name}</span>`;
    div.addEventListener('dragstart', e => {
      e.dataTransfer.setData('elementName', el.name);
    });
    div.addEventListener('click', () => {
      spawnTile(el, Math.random() * 400 + 80, Math.random() * 200 + 80);
    });
    list.appendChild(div);
  });
  document.getElementById('discoveredCount').textContent = discovered.size;
}

// ============================================================
// CANVAS DROP from sidebar
// ============================================================

const canvas = document.getElementById('canvas');

canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
  e.preventDefault();
  const name = e.dataTransfer.getData('elementName');
  if (!name) return;
  const el = discovered.get(name);
  if (!el) return;
  const rect = canvas.getBoundingClientRect();
  spawnTile(el, e.clientX - rect.left - 40, e.clientY - rect.top - 18);
});

// ============================================================
// TILES
// ============================================================

function spawnTile(element, x, y, isNew = false) {
  const tile = {
    id: nextTileId++,
    element,
    x,
    y,
    domEl: null,
  };

  const dom = document.createElement('div');
  dom.className = 'tile' + (isNew ? ' new-tile' : '');
  dom.style.left = x + 'px';
  dom.style.top = y + 'px';
  dom.innerHTML = `<span class="icon">${element.emoji}</span><span class="label">${element.name}</span>`;
  dom.dataset.tileId = tile.id;

  // Mouse drag
  dom.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    const rect = dom.getBoundingClientRect();
    dragging = {
      tile,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
    };
    dom.classList.add('dragging');
    // Bring to front
    dom.style.zIndex = 100;
  });

  // Right click
  dom.addEventListener('contextmenu', e => {
    e.preventDefault();
    contextTarget = tile;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });

  tile.domEl = dom;
  canvas.appendChild(dom);
  canvasTiles.push(tile);

  // Hide hint
  if (canvasTiles.length > 0) {
    document.getElementById('canvasHint').style.display = 'none';
  }

  updateCount();
  return tile;
}

function removeTile(tileId) {
  const idx = canvasTiles.findIndex(t => t.id === tileId);
  if (idx === -1) return;
  const tile = canvasTiles[idx];
  tile.domEl.remove();
  canvasTiles.splice(idx, 1);
  if (canvasTiles.length === 0) {
    document.getElementById('canvasHint').style.display = '';
  }
  updateCount();
}

function updateCount() {
  document.getElementById('canvasCount').textContent = canvasTiles.length;
}

// ============================================================
// MOUSE MOVE / UP
// ============================================================

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - dragging.offsetX;
  const y = e.clientY - rect.top - dragging.offsetY;
  dragging.tile.x = Math.max(0, Math.min(x, rect.width - 120));
  dragging.tile.y = Math.max(0, Math.min(y, rect.height - 40));
  dragging.tile.domEl.style.left = dragging.tile.x + 'px';
  dragging.tile.domEl.style.top = dragging.tile.y + 'px';
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  const droppedTile = dragging.tile;
  dragging.tile.domEl.classList.remove('dragging');
  dragging.tile.domEl.style.zIndex = '';
  dragging = null;

  // Check overlap with another tile
  const target = findOverlap(droppedTile);
  if (target) {
    combine(droppedTile, target);
  }
});

function findOverlap(tile) {
  const tRect = tile.domEl.getBoundingClientRect();
  const tCX = tRect.left + tRect.width / 2;
  const tCY = tRect.top + tRect.height / 2;

  for (const other of canvasTiles) {
    if (other.id === tile.id) continue;
    const oRect = other.domEl.getBoundingClientRect();
    if (
      tCX > oRect.left && tCX < oRect.right &&
      tCY > oRect.top && tCY < oRect.bottom
    ) {
      return other;
    }
  }
  return null;
}

// Close context menu on click elsewhere
document.addEventListener('click', () => {
  document.getElementById('contextMenu').classList.remove('show');
});

// ============================================================
// COMBINE
// ============================================================

const pendingCombos = new Set(); // prevent double-combos

async function combine(tileA, tileB) {
  const key = [tileA.id, tileB.id].sort().join('-');
  if (pendingCombos.has(key)) return;
  pendingCombos.add(key);

  const nameA = tileA.element.name;
  const nameB = tileB.element.name;
  const hash = pairHash(nameA, nameB);

  // Merge animation
  tileA.domEl.classList.add('merging');
  tileB.domEl.classList.add('merging');

  // Remember positions before removing
  const spawnX = (tileA.x + tileB.x) / 2;
  const spawnY = (tileA.y + tileB.y) / 2;

  setTimeout(() => {
    removeTile(tileA.id);
    removeTile(tileB.id);
  }, 350);

  // Check cache
  if (combinationCache.has(hash)) {
    const cached = combinationCache.get(hash);
    setTimeout(() => {
      spawnTile(cached, spawnX, spawnY, false);
      pendingCombos.delete(key);
    }, 450);
    return;
  }

  // Show loading tile
  let loadingTile = null;
  setTimeout(() => {
    if (pendingCombos.has(key)) {
      const loadingEl = { id: -1, name: '...', emoji: '✨' };
      loadingTile = spawnTile(loadingEl, spawnX, spawnY, false);
      loadingTile.domEl.classList.add('loading-tile');
    }
  }, 450);

  // Call Claude API
  try {
    const result = await callClaudeAPI(nameA, nameB);
    combinationCache.set(hash, result);

    // Is it a new discovery?
    const isFirstDiscovery = !discovered.has(result.name);
    if (isFirstDiscovery) {
      result.id = nextId++;
      result.isNew = true;
      discovered.set(result.name, result);
      renderSidebar();
      showToast(`✨ First discovery: ${result.emoji} ${result.name}!`, true);
    } else {
      result.isNew = false;
    }

    if (loadingTile) removeTile(loadingTile.id);
    spawnTile(result, spawnX, spawnY, isFirstDiscovery);
  } catch (err) {
    if (loadingTile) removeTile(loadingTile.id);
    showToast('✗ Combination failed — try again');
  }

  pendingCombos.delete(key);
}

// ============================================================
// CLAUDE API CALL
// ============================================================

async function callClaudeAPI(elementA, elementB) {
  const prompt = `You are the combination engine for a game called Infinite Craft.
The player combines two elements to create a new one.

Rules:
- Respond with ONLY a JSON object: {"emoji": "🔥", "name": "Steam"}
- The name should be 1-3 words, creative, logical
- Choose an appropriate emoji
- Be creative but sensible (Fire + Water = Steam, Fire + Earth = Lava, etc.)
- The result can be anything: objects, concepts, mythical things, phenomena
- No explanation, no markdown, just the raw JSON

Combine: "${elementA}" + "${elementB}"`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 100,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) throw new Error('API error');
  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('').trim();

  // Strip possible markdown fences
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);

  if (!parsed.name || !parsed.emoji) throw new Error('Bad response');

  // Check if we already discovered it
  if (discovered.has(parsed.name)) {
    return discovered.get(parsed.name);
  }

  return { id: null, name: parsed.name, emoji: parsed.emoji, isNew: true };
}

// ============================================================
// HELPERS
// ============================================================

function clearCanvas() {
  canvasTiles.forEach(t => t.domEl.remove());
  canvasTiles = [];
  document.getElementById('canvasHint').style.display = '';
  updateCount();
}

function duplicateTile() {
  if (!contextTarget) return;
  spawnTile(contextTarget.element, contextTarget.x + 30, contextTarget.y + 30);
  contextTarget = null;
}

function deleteTile() {
  if (!contextTarget) return;
  removeTile(contextTarget.id);
  contextTarget = null;
}

let toastTimer;
function showToast(msg, firstDiscovery = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (firstDiscovery ? ' first-discovery' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
}

// ============================================================
// INIT
// ============================================================
renderSidebar();
</script>
</body>
</html>
